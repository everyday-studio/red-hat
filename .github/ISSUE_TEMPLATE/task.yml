name: 📋 Task
description: 개발 작업, 리팩터링, 설정 등 기능/버그 외의 작업을 등록합니다.
title: "[Task] "
labels: ["task"]
assignees: []

body:
  - type: dropdown
    id: type
    attributes:
      label: 작업 유형
      options:
        - Feat — 새 기능 구현
        - Refactor — 리팩터링 (동작 변경 없음)
        - Chore — 빌드, 설정, 툴링
        - Docs — 문서 작업
        - Style — 포맷팅 / 정리
        - Perf — 성능 개선
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 작업 설명
      description: 무엇을 왜 해야 하는지 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 완료 기준 (Acceptance Criteria)
      description: 이 작업이 완료되었다고 판단하는 기준을 체크리스트로 작성해주세요.
      placeholder: |
        - [ ] api_client.gd에 모든 HTTP 호출 중앙화 완료
        - [ ] HTTPRequest 직접 사용 코드 제거
        - [ ] 기존 기능 동작 이상 없음 확인
    validations:
      required: true

  - type: textarea
    id: related
    attributes:
      label: 관련 이슈 / 참고 자료
      placeholder: "Closes #12, Refs #7"
