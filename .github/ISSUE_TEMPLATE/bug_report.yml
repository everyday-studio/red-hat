name: 🐛 Bug Report
description: 게임 또는 시스템에서 발생한 버그를 신고합니다.
title: "[Bug] "
labels: ["bug", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        버그 리포트를 작성해주셔서 감사합니다.
        재현 가능한 정보를 최대한 상세히 작성해주세요.

  - type: dropdown
    id: area
    attributes:
      label: 발생 영역
      description: 버그가 발생한 시스템 또는 기능 영역을 선택하세요.
      options:
        - 헬멧 시스템 (Helmet System)
        - 총 시스템 (Gun System)
        - 멀티플레이어 / 네트워크 (Multiplayer)
        - 매치메이킹 (Matchmaking)
        - 태스크 시스템 (Task System)
        - 근접 감지 / 타이머 (Proximity / Timer)
        - UI / HUD
        - CCTV 관전 모드 (Spectator)
        - Steam 인증 (Steam Auth)
        - 오디오 (Audio)
        - 기타 (Other)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 버그 설명
      description: 어떤 문제가 발생했나요?
      placeholder: "예: BLACK 헬멧 플레이어가 총을 발사했을 때 자폭 대신 실탄이 발사되는 현상 발생"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 재현 방법
      description: 버그를 재현하기 위한 단계를 순서대로 작성해주세요.
      placeholder: |
        1. 로비에서 매치 시작
        2. BLACK 헬멧 배정 확인 (다른 플레이어 시점으로 확인)
        3. 총 발사 (좌클릭)
        4. 상대방 피격 확인
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 예상 동작
      description: 정상적으로 작동했을 때 어떤 결과를 기대했나요?
      placeholder: "BLACK 헬멧이 발사 시 자신의 헬멧이 폭발해야 함"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 동작
      description: 실제로 무슨 일이 일어났나요?
      placeholder: "상대방이 총에 맞아 KO됨"
    validations:
      required: true

  - type: input
    id: godot-version
    attributes:
      label: Godot 버전
      placeholder: "예: 4.3.stable"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: 로그 / 에러 메시지
      description: Godot 콘솔 출력이나 관련 에러 메시지를 붙여넣으세요.
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: 스크린샷 / 영상
      description: 버그를 보여주는 스크린샷 또는 화면 녹화가 있다면 첨부해주세요.

  - type: checkboxes
    id: checklist
    attributes:
      label: 제출 전 확인
      options:
        - label: 이미 동일한 이슈가 등록되어 있지 않은지 확인했습니다.
          required: true
        - label: 최신 `main` 브랜치에서 재현을 확인했습니다.
          required: true
