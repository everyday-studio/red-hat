services:
  db:
    image: postgres:17
    container_name: redhat-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: redhat
    ports:
      - "5433:5432"
    volumes:
      - redhat_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d redhat"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: redhat-server
    ports:
      - "8081:8080"
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SECURE_JWT_PRIVATE_KEY_BASE64: ${SECURE_JWT_PRIVATE_KEY_BASE64}
      SECURE_JWT_PUBLIC_KEY_BASE64: ${SECURE_JWT_PUBLIC_KEY_BASE64}
      STEAM_API_KEY: ${STEAM_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redhat_postgres_data:
